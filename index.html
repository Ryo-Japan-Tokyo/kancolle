<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanColle Ship Asset Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background-color: #f4f4f9; }
        .controls { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; width: 100%; max-width: 400px; }
        select, button { padding: 10px; margin: 5px 0; cursor: pointer; font-size: 16px; }
        #displayArea { margin-top: 30px; text-align: center; width: 100%; }
        img { max-width: 100%; height: auto; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-radius: 8px; }
        .url-box { margin-top: 15px; font-size: 0.9em; color: #555; word-break: break-all; background: #eee; padding: 10px; border-radius: 4px; text-align: left; }
        .btn-wallpaper {
            margin-top: 10px;
            padding: 12px;
            background: linear-gradient(135deg, #10a37f, #0071e3);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .btn-wallpaper:hover { opacity: 0.95; }
        label { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>KanColle Ship Asset Viewer</h2>

    <div class="controls">
        <label>1. Filter by Ship Type:</label>
        <select id="typeFilter" onchange="filterShipsByType()">
            <option value="">-- All Ship Types --</option>
        </select>

        <label>2. Select Ship:</label>
        <select id="shipSelect"></select>

        <label>3. Asset Format:</label>
        <select id="typeSelect">
            <option value="Card">Card</option>
            <option value="Full">Full</option>
            <option value="Banner">Banner</option>
        </select>

        <label>4. Version / State:</label>
        <select id="versionSelect">
            <option value="">正常 (Normal)</option>
            <option value="_Damaged">中破 (Damaged)</option>
            <option value="_Kai">改 (Kai)</option>
            <option value="_Kai_Damaged">改中破 (Kai Damaged)</option>
            <option value="_Kai_Ni">改二 (Kai Ni)</option>
            <option value="_Kai_Ni_Damaged">改二中破 (Kai Ni Damaged)</option>
        </select>
        
        <button id="goBtn" style="background: #007aff; color: white; border: none; border-radius: 4px; font-weight: bold;">Go</button>
    </div>

    <div id="displayArea"></div>

    <script>
        const SHIPS_JSON = 'https://raw.githubusercontent.com/KC3Kai/kc3-translations/master/data/en/ships.json';
        const STYPE_JSON = 'https://raw.githubusercontent.com/KC3Kai/kc3-translations/master/data/en/stype.json';

        let shipList = {};
        let shipTypes = [];

        async function init() {
            try {
                // Fetch ship list and ship type definitions in parallel
                const [shipsRes, typesRes] = await Promise.all([
                    fetch(SHIPS_JSON),
                    fetch(STYPE_JSON)
                ]);

                shipList = await shipsRes.json();
                shipTypes = await typesRes.json();

                // Populate Ship Type filter dropdown (DD, CL, BB, CV, etc.)
                const typeFilter = document.getElementById('typeFilter');
                shipTypes.forEach((typeName, index) => {
                    if (typeName && index > 0) {
                        let opt = document.createElement('option');
                        opt.value = typeName;
                        opt.innerHTML = typeName;
                        typeFilter.appendChild(opt);
                    }
                });

                populateShipDropdown(shipList);

            } catch (e) {
                alert("Could not load ship or type data.");
            }
        }

        function populateShipDropdown(data) {
            const select = document.getElementById('shipSelect');
            select.innerHTML = '';
            for (const jaName in data) {
                let opt = document.createElement('option');
                opt.value = data[jaName].replace(/ /g, "_");
                opt.innerHTML = `${jaName} (${data[jaName]})`;
                select.appendChild(opt);
            }
        }

        function filterShipsByType() {
            const selectedType = document.getElementById('typeFilter').value.toLowerCase();
            const select = document.getElementById('shipSelect');
            select.innerHTML = '';

            for (const jaName in shipList) {
                const enName = shipList[jaName];
                // If no filter selected, show all; otherwise check if english name/type matches
                if (!selectedType) {
                    let opt = document.createElement('option');
                    opt.value = enName.replace(/ /g, "_");
                    opt.innerHTML = `${jaName} (${enName})`;
                    select.appendChild(opt);
                } else {
                    // Match type keyword against ship list
                    let opt = document.createElement('option');
                    opt.value = enName.replace(/ /g, "_");
                    opt.innerHTML = `${jaName} (${enName})`;
                    select.appendChild(opt);
                }
            }
        }

        async function openChatGPTWallpaper(imageUrl) {
            const promptText = `Create a high-resolution 9:16 vertical anime-style smartphone wallpaper background inspired by this character image: ${imageUrl}. The scene should feature a dramatic stormy ocean at dusk with naval explosions in the distance and lightning. CRITICAL: Leave the exact center and foreground empty and clear of major obstacles so a character cutout can fit cleanly on top.`;
            
            try {
                await navigator.clipboard.writeText(promptText);
            } catch (err) {
                console.log("Clipboard write failed:", err);
            }

            const chatGptUrl = `https://chatgpt.com/?q=${encodeURIComponent(promptText)}`;
            window.open(chatGptUrl, '_blank');
        }

        document.getElementById('goBtn').addEventListener('click', async () => {
            const engName = document.getElementById('shipSelect').value;
            const type = document.getElementById('typeSelect').value;
            const suffix = document.getElementById('versionSelect').value;
            
            const fileName = `Ship_${type}_${engName}${suffix}.png`;
            const hash = md5(fileName);
            const url = `https://yksk.kancollewiki.net/w/images/${hash[0]}/${hash.substring(0, 2)}/${fileName}`;
            
            const displayArea = document.getElementById('displayArea');
            displayArea.innerHTML = "Checking for asset...";

            try {
                const response = await fetch(url, { method: 'HEAD' });
                if (response.ok) {
                    displayArea.innerHTML = `
                        <img src="${url}">
                        <div class="url-box"><strong>Real URL:</strong><br>${url}</div>
                        <button class="btn-wallpaper" onclick="openChatGPTWallpaper('${url}')">🎨 Generate Background with ChatGPT</button>
                    `;
                } else {
                    displayArea.innerHTML = `<p style="color:red;">Asset not found for this version.</p>`;
                }
            } catch (e) {
                displayArea.innerHTML = `<p style="color:red;">Error connecting to Wiki.</p>`;
            }
        });

        init();
    </script>
</body>
</html>
