<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanColle Ship Asset Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background-color: #f4f4f9; }
        .controls { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            gap: 10px; 
            width: 100%; 
            max-width: 950px; 
            flex-wrap: wrap;
        }
        select, button { padding: 8px 12px; cursor: pointer; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        #shipSelect { flex-grow: 1; min-width: 150px; }
        #variantSelect { min-width: 150px; max-width: 200px; }
        #displayArea { margin-top: 30px; text-align: center; width: 100%; }
        img { max-width: 100%; height: auto; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-radius: 8px; }
        .url-box { margin-top: 15px; font-size: 0.9em; color: #555; word-break: break-all; background: #eee; padding: 10px; border-radius: 4px; text-align: left; }
        .btn-wallpaper {
            margin-top: 10px;
            padding: 12px;
            background: linear-gradient(135deg, #10a37f, #0071e3);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .btn-wallpaper:hover { opacity: 0.95; }
        .loading-text { font-size: 12px; color: #007aff; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="typeFilter" onchange="filterShipsByType()">
            <option value="">ALL</option>
            <option value="BB">BB</option>
            <option value="CV">CV</option>
            <option value="CA">CA</option>
            <option value="CL">CL</option>
            <option value="DD">DD</option>
            <option value="DE">DE</option>
            <option value="SS">SS</option>
            <option value="OTHER">OTHER</option>
        </select>

        <select id="shipSelect" onchange="onShipChange()"></select>

        <!-- Dynamic Seasonal / Variant CG Dropdown -->
        <select id="variantSelect">
            <option value="">Default (Base CG)</option>
        </select>

        <select id="typeSelect">
            <option value="Card">Card</option>
            <option value="Full" selected>Full</option>
            <option value="Banner">Banner</option>
        </select>

        <select id="versionSelect">
            <option value="">正常 (Normal)</option>
            <option value="_Damaged" selected>中破 (Damaged)</option>
        </select>
        
        <button id="goBtn" style="background: #007aff; color: white; border: none; font-weight: bold;">Go</button>
    </div>

    <div id="displayArea"></div>

    <script>
        const SHIPS_EN_JSON = 'https://raw.githubusercontent.com/KC3Kai/kc3-translations/master/data/en/ships.json';
        const STYPE_EN_JSON = 'https://raw.githubusercontent.com/KC3Kai/kc3-translations/master/data/en/stype.json';
        const MASTER_SHIPS_JSON = 'https://raw.githubusercontent.com/Tibowl/api_start2/master/parsed/api_mst_ship.json';

        let shipListEN = {};
        let stypeNames = [];
        let shipsByCustomCategory = {
            'BB': [], 'CV': [], 'CA': [], 'CL': [], 'DD': [], 'DE': [], 'SS': [], 'OTHER': []
        };

        function getCustomCategoryGroup(rawType) {
            if (!rawType) return 'OTHER';
            const type = rawType.toUpperCase();

            if (['BB', 'FBB', 'BBV'].includes(type)) return 'BB';
            if (['CV', 'CVB', 'CVL'].includes(type)) return 'CV';
            if (['CA', 'CAV'].includes(type)) return 'CA';
            if (['CL', 'CLT', 'CT'].includes(type)) return 'CL';
            if (['DD'].includes(type)) return 'DD';
            if (['DE'].includes(type)) return 'DE';
            if (['SS', 'SSV'].includes(type)) return 'SS';
            if (['AV', 'LHA', 'AR', 'AS', 'AO'].includes(type)) return 'OTHER';

            return 'OTHER';
        }

        function getEnglishShipName(jaName) {
            if (shipListEN[jaName]) {
                return {
                    enName: shipListEN[jaName].replace(/ /g, "_"),
                    displayName: jaName
                };
            }

            const suffixRules = [
                { jp: "航改二", enSuffix: "_Kou_Kai_Ni" },
                { jp: "改二丙", enSuffix: "_Kai_Ni_C"   },
                { jp: "改二甲", enSuffix: "_Kai_Ni_A"   },
                { jp: "改二乙", enSuffix: "_Kai_Ni_B"   },
                { jp: "改二丁", enSuffix: "_Kai_Ni_D"   },
                { jp: "改三護", enSuffix: "_Kai_San_Go" },
                { jp: "改三",   enSuffix: "_Kai_San"    },
                { jp: "改二",   enSuffix: "_Kai_Ni"     },
                { jp: "改",     enSuffix: "_Kai"        }
            ];

            for (const rule of suffixRules) {
                if (jaName.endsWith(rule.jp)) {
                    const baseJpName = jaName.slice(0, -rule.jp.length);
                    const baseEnName = shipListEN[baseJpName] || baseJpName;
                    
                    return {
                        enName: `${baseEnName.replace(/ /g, "_")}${rule.enSuffix}`,
                        displayName: jaName
                    };
                }
            }

            return {
                enName: jaName.replace(/ /g, "_"),
                displayName: jaName
            };
        }

        async function init() {
            const displayArea = document.getElementById('displayArea');
            displayArea.innerHTML = "Loading KanColle ship database...";

            try {
                const [shipsEnRes, stypeRes, masterRes] = await Promise.all([
                    fetch(SHIPS_EN_JSON),
                    fetch(STYPE_EN_JSON),
                    fetch(MASTER_SHIPS_JSON)
                ]);

                shipListEN = await shipsEnRes.json();
                stypeNames = await stypeRes.json();
                const masterShips = await masterRes.json();

                masterShips.forEach(ship => {
                    const stypeId = ship.api_stype;
                    const jaName = ship.api_name;
                    const rawStypeName = stypeNames[stypeId] || '';

                    if (ship.api_id < 1500 && jaName && jaName !== "なし") {
                        const targetGroup = getCustomCategoryGroup(rawStypeName);
                        const shipInfo = getEnglishShipName(jaName);

                        const exists = shipsByCustomCategory[targetGroup].some(s => s.jaName === jaName);
                        if (!exists) {
                            shipsByCustomCategory[targetGroup].push({
                                jaName: jaName,
                                enName: shipInfo.enName,
                                displayName: shipInfo.displayName
                            });
                        }
                    }
                });

                populateShipDropdown(null);
                displayArea.innerHTML = "";

            } catch (e) {
                console.error(e);
                displayArea.innerHTML = "<p style='color:red;'>Could not load game data. Please refresh.</p>";
            }
        }

        function populateShipDropdown(categoryGroup) {
            const select = document.getElementById('shipSelect');
            select.innerHTML = '';

            let shipsToDisplay = [];

            if (categoryGroup) {
                shipsToDisplay = shipsByCustomCategory[categoryGroup] || [];
            } else {
                const allShips = [];
                Object.values(shipsByCustomCategory).forEach(list => allShips.push(...list));
                
                const seen = new Set();
                shipsToDisplay = allShips.filter(s => {
                    if (seen.has(s.jaName)) return false;
                    seen.add(s.jaName);
                    return true;
                });
            }

            shipsToDisplay.sort((a, b) => a.jaName.localeCompare(b.jaName, 'ja'));

            shipsToDisplay.forEach(ship => {
                let opt = document.createElement('option');
                opt.value = ship.enName;
                opt.innerHTML = ship.displayName;
                select.appendChild(opt);
            });

            // Trigger seasonal fetch for initial ship
            onShipChange();
        }

        function filterShipsByType() {
            const selectedCategory = document.getElementById('typeFilter').value;
            populateShipDropdown(selectedCategory || null);
        }

        // --- MEDIAWIKI API INTEGRATION FOR SEASONAL CGs ---
        async function onShipChange() {
            const shipEnName = document.getElementById('shipSelect').value;
            const variantSelect = document.getElementById('variantSelect');

            if (!shipEnName) {
                variantSelect.innerHTML = '<option value="">Default (Base CG)</option>';
                return;
            }

            variantSelect.innerHTML = '<option value="">Loading CGs...</option>';

            // Extract base ship name (e.g., "Fubuki" from "Fubuki_Kai_Ni")
            const baseShipName = shipEnName.split('_')[0];

            try {
                // Fetch images listed on the ship's Wiki Gallery page
                const apiUrl = `https://en.kancollewiki.net/w/api.php?action=query&titles=${baseShipName}/Gallery&prop=images&imlimit=500&format=json&origin=*`;
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                const pages = data.query ? data.query.pages : {};
                const pageId = Object.keys(pages)[0];

                const seasonalTags = new Set();

                if (pageId && pageId !== "-1" && pages[pageId].images) {
                    pages[pageId].images.forEach(imgObj => {
                        const title = imgObj.title.replace("File:", "");
                        
                        // Look for matching files (e.g. Ship_Full_Fubuki_Rainy.png, Ship_Full_Fubuki_Kai_Ni_Autumn_Casual.png)
                        if (title.startsWith("Ship_") && title.includes(shipEnName)) {
                            // Strip out standard prefixes & extensions
                            let cleanName = title
                                .replace(/\.(png|jpg|jpeg)$/i, '')
                                .replace(/_Damaged$/i, '');

                            // Remove format tag
                            cleanName = cleanName.replace(/^Ship_(Full|Card|Banner)_/, '');

                            // If there is extra text remaining after the ship name, it's a seasonal tag!
                            if (cleanName.startsWith(shipEnName)) {
                                const tag = cleanName.replace(shipEnName, '').replace(/^_+/, '');
                                if (tag) {
                                    seasonalTags.add(tag);
                                }
                            }
                        }
                    });
                }

                // Populate Variant Dropdown
                variantSelect.innerHTML = '<option value="">Default (Base CG)</option>';
                
                Array.from(seasonalTags).sort().forEach(tag => {
                    const opt = document.createElement('option');
                    opt.value = `_${tag}`;
                    opt.innerHTML = tag.replace(/_/g, ' ');
                    variantSelect.appendChild(opt);
                });

            } catch (err) {
                console.warn("Could not query wiki seasonal CGs:", err);
                variantSelect.innerHTML = '<option value="">Default (Base CG)</option>';
            }
        }

        async function openChatGPTWallpaper(imageUrl) {
            const promptText = `Create a high-resolution 9:16 vertical anime-style smartphone wallpaper background inspired by this character image: ${imageUrl}. The scene should feature a dramatic stormy ocean at dusk with naval explosions in the distance and lightning. CRITICAL: Leave the exact center and foreground empty and clear of major obstacles so a character cutout can fit cleanly on top.`;
            
            try {
                await navigator.clipboard.writeText(promptText);
            } catch (err) {
                console.log("Clipboard write failed:", err);
            }

            const chatGptUrl = `https://chatgpt.com/?q=${encodeURIComponent(promptText)}`;
            window.open(chatGptUrl, '_blank');
        }

        document.getElementById('goBtn').addEventListener('click', async () => {
            const engName = document.getElementById('shipSelect').value;
            if (!engName) {
                alert("Please select a ship first!");
                return;
            }

            const type = document.getElementById('typeSelect').value;
            const variant = document.getElementById('variantSelect').value; // e.g. "_Rainy" or ""
            const suffix = document.getElementById('versionSelect').value;
            
            // Build final filename: Ship_{Type}_{ShipName}{Variant}{Damaged}.png
            const fileName = `Ship_${type}_${engName}${variant}${suffix}.png`;
            const hash = md5(fileName);
            const url = `https://yksk.kancollewiki.net/w/images/${hash[0]}/${hash.substring(0, 2)}/${fileName}`;
            
            const displayArea = document.getElementById('displayArea');
            displayArea.innerHTML = "Checking for asset...";

            try {
                const response = await fetch(url, { method: 'HEAD' });
                if (response.ok) {
                    displayArea.innerHTML = `
                        <img src="${url}">
                        <div class="url-box"><strong>Real URL:</strong><br>${url}</div>
                        <button class="btn-wallpaper" onclick="openChatGPTWallpaper('${url}')">🎨 Generate Background with ChatGPT</button>
                    `;
                } else {
                    displayArea.innerHTML = `<p style="color:red;">Asset not found for this combination (Filename checked: ${fileName}).</p>`;
                }
            } catch (e) {
                displayArea.innerHTML = `<p style="color:red;">Error connecting to Wiki.</p>`;
            }
        });

        init();
    </script>
</body>
</html>
